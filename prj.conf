# Enable I2S driver
CONFIG_I2S=y

# Enable console output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Enable floating point for sine wave generation
CONFIG_FPU=y

# Increase main stack size for floating point operations
CONFIG_MAIN_STACK_SIZE=4096

# Enable newlib for math functions (sin)
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
